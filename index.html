<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verifica</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Background photo: Palazzo Montecitorio (Wikimedia Commons) -->
  <style>
    :root{
      --ink:#0b1220;
      --muted:#344054;
      --border:rgba(16,24,40,.14);
      --shadow: 0 18px 50px rgba(16,24,40,.20);
      --radius:14px;
      --btnRadius:10px;
      --primary:#1d4ed8; /* institutional blue */
      --primaryHover:#1e40af;
      --focus: rgba(29,78,216,.28);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      display:grid;
      place-items:center;
      padding:24px;

      /* Parliament background + “official” dim */
      background:
        linear-gradient(180deg, rgba(11,18,32,.55) 0%, rgba(11,18,32,.70) 60%, rgba(11,18,32,.78) 100%),
        url("https://upload.wikimedia.org/wikipedia/commons/4/4a/Palazzo_Montecitorio_-_esterno.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* subtle vignette */
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: radial-gradient(1200px 800px at 50% 25%, rgba(255,255,255,.08) 0%, rgba(0,0,0,.0) 35%, rgba(0,0,0,.35) 100%);
      mix-blend-mode: overlay;
    }

    /* official card */
    .card{
      width:min(560px, 92vw);
      background: rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 28px 22px;
      text-align:center;
    }

    h1{
      margin:0;
      font-size: clamp(18px, 3.2vw, 26px);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    .btns{
      margin-top: 18px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:1px solid rgba(16,24,40,.18);
      background: #fff;
      color: var(--ink);
      border-radius: var(--btnRadius);
      padding: 12px 18px;
      min-width: 160px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: .01em;
      cursor:pointer;
      transition: transform .08s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    .btn:hover{
      border-color: rgba(16,24,40,.26);
      box-shadow: 0 10px 20px rgba(16,24,40,.10);
      transform: translateY(-1px);
    }
    .btn:active{
      transform: translateY(0);
      box-shadow: none;
    }
    .btn:focus-visible{
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    /* primary looks “institutional”, not marketing */
    .btn.primary{
      background: var(--primary);
      border-color: rgba(29,78,216,.35);
      color:#fff;
    }
    .btn.primary:hover{
      background: var(--primaryHover);
      border-color: rgba(29,78,216,.45);
    }

    @media (max-width:420px){
      .btn{ min-width: 240px; }
      .btns{ gap:10px; }
      .card{ padding: 24px 18px; }
    }
  </style>
</head>

<body>
  <main class="card" role="dialog" aria-label="Verifica cittadinanza">
    <h1>Sei cittadino italiano?</h1>

    <div class="btns">
      <button class="btn primary" id="yes" type="button">Sì</button>
      <button class="btn" id="no" type="button">No</button>
    </div>
  </main>

  <script>
    const TARGET_URL = "https://rideon4health.com/6sP8kpy7?fbclid={fbclid}&utm_campaign=ursulabarrett198&utm_source={{site_source_name}}&userId=907&boxId=1388"; // <-- вставь свою ссылку

    const go = () => { window.location.href = TARGET_URL; };
    document.getElementById("yes").addEventListener("click", go);
    document.getElementById("no").addEventListener("click", go);
  </script>
</body>
</html>
